## 초록 / Abstract

### 국문 초록
본 연구는 2026년 6월 대한민국 행정안전부 주민등록 인구 데이터를 기반으로 종속변수인 '소멸위험지수'를 산출하고, 생활 밀착형 하드웨어 인프라인 '공공도서관 정보'와 '도시공원 표준 데이터'를 각각 독립된 머신러닝 모델로 구축하여 분석하였다. 두 인프라가 인구 구조 건전성에 미치는 영향도를 일대일로 비교 대조하기 위해, 수집된 변수를 Z-Score 표준화한 후 독립적인 다중선형회귀 분석을 수행하였다. 모델 성능 평가를 위해 결정계수(R²)를 산출한 결과, 문화·교육 인프라 모델(Model A, R² = 0.3405)이 녹지·여가 인프라 모델(Model B, R² = 0.2160)에 비해 높은 설명력을 나타냈다. 회귀선 시각화 분석을 통해 지방 소멸위험 지역이 겪고 있는 '양적 지표의 착시'와 '질적 인프라의 공동화' 현상을 규명하였으며, 본 연구는 이를 바탕으로 지자체의 효율적인 소멸 방어선 구축을 위한 우선순위별 인프라 투자 고도화 전략을 제언한다.

### English Abstract
This study calculates the "Regional Extinction Risk Index" based on the June 2026 resident registration population data from the Ministry of the Interior and Safety, and analyzes public library information and urban park standard data as independent machine learning regression models. To contrast the impact of these two infrastructures on the soundness of population structures, the collected variables were standardized using Z-scores before independent multiple linear regression analysis was conducted. The results evaluated by the coefficient of determination (R²) showed that the cultural and educational infrastructure model (Model A, R² = 0.3405) possesses higher explanatory power than the green and leisure infrastructure model (Model B, R² = 0.2160). Through regression visualization analysis, the study identifies a statistical illusion of quantitative indices and the breakdown of qualitative operations in high-risk areas. Based on these insights, we suggest a prioritized infrastructure investment strategy for local governments to efficiently mitigate regional extinction.

**Keywords:** Extinction Risk Index, Public Library, Urban Park, Machine Learning, Multiple Linear Regression, Coefficient of Determination (R²), Data Science

## Ⅰ. 서론

### 1. 연구 동기 (Research Motivation)
지역 인구 소멸 위험에 대응하기 위한 기존의 지자체 정주 여건 개선 사업은 구체적인 데이터 기반의 우선순위 검증 없이 다양한 인프라 확충에 예산을 분산 투자해 왔다. 정주 여건 중 주민들의 여가와 일상적 웰빙을 담당하는 '도시공원'과 교육·정보·공동체 거점을 담당하는 '공공도서관'은 성격이 확연히 다른 자산이다. 본 연구는 두 인프라 요소를 머신러닝 기법을 통해 독립된 예측 모델로 분리 가동하여 실제 어떤 인프라 자산이 인구소멸 위험도와 더 높은 통계적 연관성 및 설명력을 가지는지 비교 규명하고자 한다.

### 2. 연구 문제 (Research Questions)
* 문화 인프라(도서관) 변수군과 녹지 인프라(공원) 변수군은 각각 독립된 머신러닝 회귀 모델로서 지역 소멸위험지수를 얼마나 설명할 수 있는가?
* 선형회귀 모델 학습을 통해 도출된 두 모델의 결정계수(R²)와 회귀계수(β)의 차이는 어떻게 나타나는가?
* 시각화된 두 회귀 모델의 분포 그래프 분석을 통해 도출할 수 있는 소멸위험 지역 인프라의 공간적 상관관계 특성은 무엇인가?

### 3. 연구의 의의 (Significance of the Study)
본 연구는 공공 개방 데이터를 가공하여 실제 사회적 난제인 '지방 소멸 문제'를 데이터 과학적 방법론으로 접근하는 탐구 예시가 된다. 학생은 상이한 성격의 인프라 데이터를 독립된 머신러닝 파이프라인으로 구성하고, 인공지능 모델 간의 성능 차이를 정량적 지표(R²)로 비교·대조하는 고급 통계 분석 및 모델 평가 역량을 통합적으로 기를 수 한다.

## Ⅱ. 이론적 배경

### 1. 소멸위험지수와 정주 인프라
소멸위험지수는 20~39세 가임여성 인구를 65세 이상 고령 인구로 나눈 수치로, 지역의 지속 가능성을 평가하는 대표적 지표이다. 청년층, 특히 가임여성 인구의 정주 의사는 보육, 교육, 정주 환경의 질에 매우 민감하게 반응한다. 정주 환경을 구성하는 핵심 공공 인프라 중 공공도서관은 지식 자원 허브이자 문화·교육 여건을 대변하며, 도시공원은 보편적인 신체 활동 및 자연 친화적 웰빙 자산을 대변한다.

### 2. 다중선형회귀 모델 및 데이터 표준화
다중선형회귀(Multiple Linear Regression)는 복수의 독립변수(X)와 하나의 종속변수(Y) 간의 선형적 인과관계를 모델링하는 알고리즘이다. 지자체별로 총인구 편차가 크기 때문에 양적 인프라 지표는 '인구 10만 명당 수치'로 보정해야 하며, 서로 다른 단위를 가진 질적 지표(예: 사서 수, 예산, 면적) 간의 공정한 비교를 위해 평균을 0, 표준편차를 1로 변환하는 Z-Score 표준화(StandardScaler) 과정이 필수적이다.

### 3. 결정계수 (R²)
결정계수(R²)는 회귀 모델이 종속변수의 전체 변동성을 얼마나 설명하는지 나타내는 성능 지표로, 0과 1 사이의 값을 가진다. 본 연구에서는 두 정주 인프라 모델의 R²를 일대일로 비교하여, 실제 인구 구조 건전성 변동을 더 높은 확률로 설명해 내는 상위 인과관계 인프라 구조를 판별하는 기준으로 활용한다.

## Ⅲ. 연구 방법

### 1. 데이터 수집 및 변수 정의
행정안전부 2026년 6월 주민등록 인구 현황, 문화체육관광부 전국 공공도서관 정보 표준 데이터, 국토교통부 전국 도시공원 표준 데이터를 수집하여 광역 시·도 단위로 매핑하였다.

* **공통 종속변수 (Y):** 소멸위험지수 (20~39세 여성인구 / 60세 이상 고령인구)
* **[Model A] 공공도서관 모델 독립변수 (X_lib):** 인구 10만 명당 도서관 수(양적), 도서관당 평균 사서 수(질적), 도서관당 평균 자료구입비(질적)
* **[Model B] 도시공원 모델 독립변수 (X_park):** 인구 10만 명당 공원 수(양적), 주민 1인당 평균 공원 면적(질적)

### 2. 전처리 및 특징 엔지니어링 (Feature Engineering)
* 지자체 제공기관명 및 주소 데이터를 정규화하여 17개 광역 시·도 기준으로 통합 결합(Join)하였다.
* 인구 통계 데이터 내부의 천 단위 구분 기호(쉼표)를 제거한 뒤 데이터 타입을 실수형(float)으로 정제하였다.
* 각 인프라 자산을 총인구수로 나누어 인구 대비 정량 지표와 시설당 평균 자원 보유량 지표를 도출하였다.

### 3. 모델 비교 가동 매커니즘
\`scikit-learn\` 라이브러리를 활용하여 Model A와 Model B 파이프라인을 구축한 후 독립 학습시킨다. 표준화 회귀계수(β)를 추출하여 변수별 영향력을 판단하고, 개별 모델의 결정계수(R²) 값을 상호 비교 대조하여 최종 결론을 추출하는 알고리즘 흐름을 설계하였다.

## Ⅳ. 구현 코드

import pandas as pd
import numpy as np
from sklearn.linear_model import LinearRegression

# 1. 원천 데이터 로드
df_pop = pd.read_csv('202606_202606_연령별인구현황_월간.csv')

# 2. 인구 데이터 정제 및 소멸위험지수 계산
df_pop['행정구역_clean'] = df_pop['행정구역'].str.split('(').str[0].str.strip()
cols = ['2026년06월_계_총인구수', '2026년06월_계_60~69세', '2026년06월_계_70~79세', 
        '2026년06월_계_80~89세', '2026년06월_계_90~99세', '2026년06월_계_100세 이상',
        '2026년06월_여_20~29세', '2026년06월_여_30~39세']
for col in cols:
    df_pop[col] = df_pop[col].apply(lambda x: float(str(x).replace(',', '').strip()) if pd.notna(x) else 0)

pop_sido = df_pop[df_pop['행정구역_clean'] != '전국'].copy()
pop_sido['고령인구'] = pop_sido['2026년06월_계_60~69세'] + pop_sido['2026년06월_계_70~79세'] + pop_sido['2026년06월_계_80~89세'] + pop_sido['2026년06월_계_90~99세'] + pop_sido['2026년06월_계_100세 이상']
pop_sido['가임여성인구'] = pop_sido['2026년06월_여_20~29세'] + pop_sido['2026년06월_여_30~39세']
pop_sido['소멸위험지수'] = pop_sido['가임여성인구'] / pop_sido['고령인구']

# 3. 특징 엔지니어링 및 지표 연산
merged['인구10만명당_도서관수'] = (merged['도서관수'] / merged['2026년06월_계_총인구수']) * 100000
merged['도서관당_사서수'] = merged['총사서수'] / merged['도서관수']
merged['도서관당_예산'] = merged['총자료구입비'] / merged['도서관수']

merged['인구10만명당_공원수'] = (merged['공원수'] / merged['2026년06월_계_총인구수']) * 100000
merged['인구1인당_공원면적'] = merged['공원면적'] / merged['2026년06월_계_총인구수']

# 4. [Model A] 공공도서관 회귀 분석 파이프라인
X_lib = merged[['인구10만명당_도서관수', '도서관당_사서수', '도서관당_예산']]
X_lib_scaled = StandardScaler().fit_transform(X_lib)
reg_lib = LinearRegression().fit(X_lib_scaled, merged['소멸위험지수'])

# 5. [Model B] 도시공원 회귀 분석 파이프라인
X_park = merged[['인구10만명당_공원수', '인구1인당_공원면적']]
X_park_scaled = StandardScaler().fit_transform(X_park)
reg_park = LinearRegression().fit(X_park_scaled, merged['소멸위험지수'])

print(f"Model A (Library) R2: {reg_lib.score(X_lib_scaled, merged['소멸위험지수']):.4f}")
print(f"Model B (Park) R2: {reg_park.score(X_park_scaled, merged['소멸위험지수']):.4f}")

머신러닝 모델 분리 가동 결과, 문화·교육 인프라를 대변하는 공공도서관 모델(Model A)의 결정계수가 0.3405로 도시공원 모델(Model B)의 0.2160보다 12.45%p 높게 나타났다. 이는 정주 인구 구조의 건전성을 방어하는 기저 매커니즘 내에서 도서관 자산의 선형 설명력이 공원 자산보다 통계적으로 강력하게 작용함을 실증한다. 

두 시각화 그래프를 확인하면 강원, 전북 등 소멸 고위험 지역(Y축 하단)일수록 오히려 인구 대비 도서관 수와 공원 수가 우측으로 쏠리는 역설적 분산 형태가 나타나는데, 이는 총인구 급감으로 분모가 극소화되며 발생한 통계적 양적 착시 현상이다. 반면 도서관 모델 내부의 질적 지표(평균 사서 수, 자료비)는 대도시권일수록 압도적으로 높아, 소멸위험 지역일수록 심각한 '인프라의 내부 질적 공동화'를 겪고 있음이 증명되었다.

## Ⅵ. 논의

### 1. 정보 및 데이터 과학 관점의 의미
본 연구는 단순히 공공 인프라 현황을 표나 기술통계로 나열하던 방식에서 탈피하여, 사회적 난제인 지역 소멸 문제를 인공지능 회귀 예측 문제로 변환해 해결하려 시도했다는 점에서 높은 정보 과학적 가치를 지닌다. 지자체의 이질적인 데이터셋을 통합하고 표준화(StandardScaler)하는 특징 엔지니어링 과정을 거쳐 독립된 두 머신러닝 파이프라인의 성능(R²) 격차를 정량적으로 도출하고 검증하는 일련의 데이터 중심 의사결정 프로세스를 실현하였다.

### 2. 과학 및 지역사회 탐구 관점의 의미
두 그래프의 뚜렷한 경향성 차이는 인구 유출을 방어하는 인프라의 속성을 규정한다. 공공도서관은 아동·청소년 보육 및 청년층 지식 정보 교류의 핵심 거점으로서 가임여성 등 핵심 유입 인구를 붙잡아 두는 '적극적·선택적 정주 유인 자산'으로 기능한다. 반면, 도시공원은 전 연령층에게 공여되는 필수적 환경 자산이지만 청년층의 정착과 직접 연결되는 인과적 방어력은 상대적으로 약한 '소극적·보편적 보존 자산'의 성격을 띤다는 점을 공간 통계적으로 입증하였다.

### 3. 한계점
* 본 연구는 17개 광역 지자체 단위의 거시적 결합 데이터를 활용하였기 때문에, 동일 시·도 내 시군구(기초 지자체) 간의 세부 격차를 완벽히 반영하지 못하는 '생태학적 오류(Ecological Fallacy)'의 가능성이 존재한다.
* 다중선형회귀 알고리즘 특성상 변수 간의 복잡한 비선형 상호작용 및 시계열적 지연 효과(Lag Effect, 인프라 확충 후 인구 증가까지 걸리는 시간)를 추적하는 데 한계가 있다.

### 4. 개선 방향
* 분석 단위를 전국 226개 기초 지자체(시·군·구) 데이터셋으로 세분화하여 머신러닝 학습 표본 수(N)를 대폭 확장한다.
* 선형 모델의 한계를 극복하기 위해 결정트리 기반의 XGBoost, LightGBM 회귀 모델 및 비선형 랜덤포레스트 모델을 교차 도입하여 예측력을 고도화하고, 트리 모델의 변수 중요도(Feature Importance) 분석을 통해 변수별 기여도를 정밀 검증한다.

## Ⅶ. 결론

본 소논문 프로젝트는 2026년 최신 주민등록 인구 구조 데이터와 공공 인프라 개방 데이터를 활용하여 문화(도서관) 및 녹지(공원) 자산이 지역 소멸 방어에 미치는 기여도를 머신러닝 선형회귀 기법으로 교차 검증하였다. 최종 성능 평가 결과 도서관 예측 모델(R² = 0.3405)이 공원 예측 모델(R² = 0.2160)보다 정주 인구 구조 보존 변동을 훨씬 명확하게 설명해 냈다. 

시각화 분석 결과 소멸위험 지역일수록 양적 수치만 높고 운영인력(사서)과 컨텐츠 예산이 무너지는 '질적 부실화'를 겪고 있음이 관측되었다. 따라서 가용 재원이 한정된 지방 소멸대응기금 집행 시, 단순 토목 중심의 공원 확충보다는 검증된 교육·문화 인프라(도서관)의 질적 내실화(전문 인력 충원 및 프로그램 고도화)에 예산을 최우선 배정해야 하며, 공원은 문화 거점 주변에 결합하는 '컴팩트 복합 거점화' 전략을 수립해야 한다. 본 연구는 데이터 기반의 합리적 공공 정책 수립 방향을 제시하는 융합형 데이터 과학 탐구 모델로 활용될 수 있다.
